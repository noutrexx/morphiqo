<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#080b18" />

    <title>Morphiqo — Local file conversion workspace</title>
    <meta
      name="description"
      content="Morphiqo is a local-first file conversion workspace: drop a file, pick a compatible target, and convert images, documents, media, and archives with visible job status and history."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Morphiqo — Local file conversion workspace" />
    <meta
      property="og:description"
      content="Drop a file, pick a compatible target, convert. A polished local-first converter with smart engine routing and visible job history."
    />
    <meta property="og:site_name" content="Morphiqo" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Morphiqo — Local file conversion workspace" />
    <meta
      name="twitter:description"
      content="Drop a file, pick a compatible target, convert. A polished local-first converter with smart engine routing."
    />

    <!-- Fonts: the UI is designed around these display/sans/mono families -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
